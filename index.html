<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tina's Site</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background-color: #333;
            color: white;
            padding: 10px 0;
            text-align: center;
        }
        nav {
            background-color: #444;
            padding: 10px 0;
            text-align: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
        }
        .content {
            background-color: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .course-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin: 10px 0;
            transition: transform 0.3s;
        }
        .course-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .course-card h3 {
            margin-top: 0;
        }
        .course-card a {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 16px;
            background-color: #333;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
        .course-card a:hover {
            background-color: #555;
        }
    </style>
</head>
<body>
    <header>
        <h1>Tina's Site</h1>
        <p>个人主页 - 记录学习点滴</p>
    </header>
    <nav>

            <p>这里记录了我的学习点滴，包括各种技术学习和个人成长。</p>
            
            <h3>课程模块</h3>
            <div class="course-card">
                <h3>Python基础课程</h3>
                <p>从零开始学习Python编程语言，包括基础语法、数据结构、函数等内容。</p>
                <a href="python-course/index.html">进入课程</a>

        </div>
    </div>
